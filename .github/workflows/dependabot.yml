# Based on code from https://andre.arko.net/2022/05/15/automatic-dependabot-merges/

name: "Merge updates"
on:
  workflow_run:
    workflows:
      - "Tests and Checks"
    types:
      - "completed"
    branches:
      - "dependabot/**"
jobs:
  merge:
    name: "Merge"
    runs-on: "ubuntu-latest"
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.actor == 'dependabot[bot]'
    steps:
      - name: "Approve pull request"
        uses: "juliangruber/approve-pull-request-action@v2"
        with:
          github-token: "${{ secrets.IMPRESSBOT_TOKEN }}"
          number: "${{ github.event.workflow_run.pull_requests[0].number }}"

      - name: "Merge pull request"
        uses: "actions/github-script@v9"
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const pullRequest = context.payload.workflow_run.pull_requests[0]
            const repository = context.repo
            const maxAttempts = 12
            const delayMs = 10000

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: currentPr } = await github.rest.pulls.get({
                owner: repository.owner,
                pull_number: pullRequest.number,
                repo: repository.repo,
              })

              core.info(
                `Attempt ${attempt}/${maxAttempts}: mergeable=${currentPr.mergeable} mergeable_state=${currentPr.mergeable_state}`
              )

              if (currentPr.mergeable === true) {
                await github.rest.pulls.merge({
                  merge_method: "merge",
                  owner: repository.owner,
                  pull_number: pullRequest.number,
                  repo: repository.repo,
                })

                core.info(`PR #${pullRequest.number} merged successfully`)
                return
              }

              if (currentPr.mergeable === false) {
                throw new Error(
                  `PR #${pullRequest.number} is not mergeable (state: ${currentPr.mergeable_state})`
                )
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs))
            }

            throw new Error(
              `Timed out waiting for PR #${pullRequest.number} to become mergeable`
            )
